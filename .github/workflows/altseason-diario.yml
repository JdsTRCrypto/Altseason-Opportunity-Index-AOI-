name: Altseason Opportunity Index Diário

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  calcular:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Mostrar arquivos (debug)
        run: ls -la

      - name: Rodar o cálculo
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python altseason_calculo.py
